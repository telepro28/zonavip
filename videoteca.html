<!DOCTYPE html>
<html>
<head>

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key="XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
</script>

<style>
body{
margin:0;
background:black;
}

#player{
position:absolute;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="player"></div>

<script>

function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

var canal = getParam("regional");

if(canal){

var stream = "https://nada-pi2z.onrender.com/play?regional=" + canal;

jwplayer("player").setup({

playlist: [{
sources: [{
file: stream,
type: "hls"
}]
}],

autostart:true,
width:"100%",
height:"100%",
aspectratio:"16:9",
stretching:"exactfit"

});

}else{

document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:40vh;'>Canal no especificado</h2>";

}

</script>

</body>
</html>
