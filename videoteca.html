<!DOCTYPE html>
<html>
<head>

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>

<style>
body{
margin:0;
background:black;
}

#player{
position:absolute;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="player"></div>

<script>

function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

var canal = getParam("regional");

/* URL del stream */
var getURL = "https://nada-pi2z.onrender.com/play?regional=" + canal;

/* opcional */
var getKEY = "";
var getKEY2 = "";
var getIMG = "";

var mt = '';

var playerInstance = jwplayer("player");

playerInstance.setup({

playlist: [{
title: "LUCHAMEDIA.ES",
description: "Repeticion Gratis",
image: getIMG,

sources: [{
default: true,
type: "hls",
file: mt + getURL,

drm: {
clearkey: {"keyId": getKEY, "key": getKEY2}
},

label: "HD"
}]

}],

width: "100%",
height: "100%",
aspectratio: "16:9",
autostart: true,
cast: {}

});


/* control automático de calidad */

var currentQualityIndex = -1;
var qualityLevels = [];

playerInstance.on('levelsChanged', function(){

qualityLevels = playerInstance.getPlaylistItem().sources[0].levels;

currentQualityIndex = qualityLevels.length - 1;

playerInstance.setCurrentQuality(currentQualityIndex);

});

playerInstance.on('firstFrame', function(){

if(currentQualityIndex > 0){

currentQualityIndex--;

playerInstance.setCurrentQuality(currentQualityIndex);

}

});

</script>

</body>
</html>
