<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<title>Player</title>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key="XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
</script>

<style>
body{
margin:0;
background:black;
}

#player{
position:absolute;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="player"></div>

<script>

/* obtener parametro de la URL */
function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

var canal = getParam("regional");

/* si no hay canal */
if(!canal){
document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:40vh'>No se especificó canal</h2>";
}

/* URL del stream */
var getURL = "https://nada-pi2z.onrender.com/play?regional=" + canal;

var playerInstance = jwplayer("player");

playerInstance.setup({

playlist: [{
title: "Streaming",
description: "Canal en vivo",

sources: [{
file: getURL,
type: "hls"
}]

}],

width: "100%",
height: "100%",
aspectratio: "16:9",
autostart: true,
stretching: "exactfit"

});

/* control automático de calidad */

var currentQualityIndex = -1;
var qualityLevels = [];

playerInstance.on('levelsChanged', function(){

qualityLevels = playerInstance.getPlaylistItem().sources[0].levels;

currentQualityIndex = qualityLevels.length - 1;

playerInstance.setCurrentQuality(currentQualityIndex);

});

playerInstance.on('firstFrame', function(){

if(currentQualityIndex > 0){

currentQualityIndex--;

playerInstance.setCurrentQuality(currentQualityIndex);

}

});

</script>

</body>
</html>
