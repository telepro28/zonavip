<!DOCTYPE html>
<html>
<head>

<title>no hay nada aqui</title>

<meta content="noindex, nofollow, noarchive" name="robots"/>
<meta name="referrer" content="no-referrer" />

<script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
</script>

<style>
body{
margin:0;
background:black;
}

#player{
position:absolute;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="player"></div>

<script>

function getParameterByName(name){
name = name.replace(/[\[\]]/g,"\\$&");
var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
var results = regex.exec(window.location.href);
if(!results) return null;
if(!results[2]) return '';
return decodeURIComponent(results[2].replace(/\+/g," "));
}

var canal = getParameterByName('regional');

if(canal){

var url = "https://nada-pi2z.onrender.com/play?regional=" + canal;

jwplayer("player").setup({
file: url,
autostart: true,
width: "100%",
height: "100%",
aspectratio: "16:9",
stretching: "exactfit"
});

}else{

document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:40vh;'>No se especificó canal</h2>";

}

</script>

</body>
</html>
