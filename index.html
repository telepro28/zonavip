<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* player */

#video{
position:absolute;
width:100%;
height:100%;
background:#000;
}

/* menú burbuja */

.menu{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

/* botones */

.channel{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(145deg,#222,#000);
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:14px;
transition:0.25s;
box-shadow:0 0 10px rgba(0,0,0,.8);
}

.channel:hover{
transform:scale(1.2);
background:#ff0033;
}

.active{
background:#ff0033;
box-shadow:0 0 15px #ff0033;
}

</style>

</head>

<body>

<video id="video" controls autoplay></video>

<div class="menu">

<div class="channel active" onclick="play(32)">1</div>
<div class="channel" onclick="play(33)">2</div>
<div class="channel" onclick="play(34)">3</div>
<div class="channel" onclick="play(35)">4</div>
<div class="channel" onclick="play(36)">5</div>

</div>

<script>

const video = document.getElementById("video")

let hls

function play(id){

document.querySelectorAll(".channel").forEach(el=>el.classList.remove("active"))

event.target.classList.add("active")

const stream =
"https://nada-pi2z.onrender.com/play?regional=" + id

if(Hls.isSupported()){

if(hls){
hls.destroy()
}

hls = new Hls()

hls.loadSource(stream)
hls.attachMedia(video)

}else{

video.src = stream

}

}

/* canal inicial */

play(32)

</script>

</body>
</html>
