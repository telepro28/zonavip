<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* iframe player */

#player{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* menú burbuja */

.menu{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:12px;
z-index:10;
}

/* burbujas */

.channel{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(145deg,#222,#000);
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:14px;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,.8);
}

.channel:hover{
transform:scale(1.2);
background:#ff0033;
}

.active{
background:#ff0033;
box-shadow:0 0 15px #ff0033;
}

</style>
</head>

<body>

<iframe id="player"></iframe>

<div class="menu">

<div class="channel active" onclick="play(1)">1</div>
<div class="channel" onclick="play(2)">2</div>
<div class="channel" onclick="play(3)">3</div>
<div class="channel" onclick="play(4)">4</div>
<div class="channel" onclick="play(5)">5</div>
<div class="channel" onclick="play(6)">6</div>
<div class="channel" onclick="play(7)">7</div>
<div class="channel" onclick="play(8)">8</div>

</div>

<script>

function play(n){

document.querySelectorAll(".channel").forEach(el=>el.classList.remove("active"))

event.target.classList.add("active")

document.getElementById("player").src =
"https://nada-pi2z.onrender.com/play?regional=" + n + "_"

}

/* canal inicial */

document.getElementById("player").src =
"https://nada-pi2z.onrender.com/play?regional="

</script>

</body>
</html>
