<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>

body{
margin:0;
background:#000;
font-family:system-ui;
overflow:hidden;
}

/* player */

#player{
position:absolute;
width:100%;
height:100%;
border:none;
}

/* info canal */

#info{
position:absolute;
top:25px;
left:25px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
padding:12px 18px;
border-radius:12px;
color:white;
font-size:18px;
opacity:0;
transition:.3s;
}

/* menú burbuja */

.menu{
position:fixed;
right:25px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:14px;
}

/* burbujas */

.btn{
width:52px;
height:52px;
border-radius:50%;
background:rgba(30,30,30,.9);
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:600;
transition:.25s;
}

.btn:hover{
background:#ff0033;
transform:scale(1.1);
}

.active{
background:#ff0033;
box-shadow:0 0 12px #ff0033;
}

</style>
</head>

<body>

<iframe id="player"></iframe>

<div id="info"></div>

<div class="menu">

<div class="btn active" onclick="zap(0)">1</div>
<div class="btn" onclick="zap(1)">2</div>
<div class="btn" onclick="zap(2)">3</div>
<div class="btn" onclick="zap(3)">4</div>
<div class="btn" onclick="zap(4)">5</div>

</div>

<script>

const channels=[32,33,34,35,36]

let current=0

const player=document.getElementById("player")

function zap(i){

current=i

document.querySelectorAll(".btn").forEach(e=>e.classList.remove("active"))
document.querySelectorAll(".btn")[i].classList.add("active")

player.src="https://nada-pi2z.onrender.com/play?regional="+channels[i]

showInfo(i+1)

}

function showInfo(n){

const info=document.getElementById("info")

info.innerText="Canal "+n
info.style.opacity=1

setTimeout(()=>{
info.style.opacity=0
},2000)

}

/* teclado */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight"){

current++
if(current>=channels.length) current=0

zap(current)

}

if(e.key==="ArrowLeft"){

current--
if(current<0) current=channels.length-1

zap(current)

}

})

zap(0)

</script>

</body>
</html>
