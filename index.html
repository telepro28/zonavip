<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV Player</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial;
}

/* iframe principal */

#player{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* menú burbuja */

.menu{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

/* botones */

.channel{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(145deg,#222,#000);
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:14px;
transition:0.25s;
box-shadow:0 0 10px rgba(0,0,0,.8);
}

.channel:hover{
transform:scale(1.2);
background:#ff0033;
}

.active{
background:#ff0033;
box-shadow:0 0 15px #ff0033;
}

</style>

</head>

<body>

<iframe id="player"></iframe>

<div class="menu">

<div class="channel active" onclick="play(32)">1</div>
<div class="channel" onclick="play(33)">2</div>
<div class="channel" onclick="play(34)">3</div>
<div class="channel" onclick="play(35)">4</div>
<div class="channel" onclick="play(36)">5</div>

</div>

<script>

function play(id){

document.querySelectorAll(".channel").forEach(el=>el.classList.remove("active"))

event.target.classList.add("active")

document.getElementById("player").src =
"https://nada-pi2z.onrender.com/play?regional=" + id

}

/* canal inicial */

document.getElementById("player").src =
"https://nada-pi2z.onrender.com/play?regional=32"

</script>

</body>
</html>
