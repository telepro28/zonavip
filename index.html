<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV Zapping</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial;
}

/* iframe */

#player{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* overlay canal */

#channelInfo{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 18px;
border-radius:8px;
font-size:18px;
opacity:0;
transition:0.3s;
}

/* menú burbuja */

.menu{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:100;
}

.channel{
width:50px;
height:50px;
border-radius:50%;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.25s;
}

.channel:hover{
background:#ff0033;
transform:scale(1.15);
}

.active{
background:#ff0033;
}

</style>
</head>

<body>

<iframe id="player"></iframe>

<div id="channelInfo"></div>

<div class="menu">

<div class="channel active" onclick="playChannel(0)">1</div>
<div class="channel" onclick="playChannel(1)">2</div>
<div class="channel" onclick="playChannel(2)">3</div>
<div class="channel" onclick="playChannel(3)">4</div>
<div class="channel" onclick="playChannel(4)">5</div>

</div>

<script>

const channels = [
32,
33,
34,
35,
36
]

let current = 0

function playChannel(index){

current = index

document.querySelectorAll(".channel").forEach(el=>el.classList.remove("active"))

document.querySelectorAll(".channel")[index].classList.add("active")

const id = channels[index]

document.getElementById("player").src =
"https://nada-pi2z.onrender.com/play?regional=" + id

showChannel(index+1)

}

function showChannel(num){

const info = document.getElementById("channelInfo")

info.innerText = "Canal " + num

info.style.opacity = 1

setTimeout(()=>{
info.style.opacity = 0
},2000)

}

/* zapping teclado */

document.addEventListener("keydown",function(e){

if(e.key==="ArrowUp" || e.key==="ArrowRight"){

current++

if(current >= channels.length) current = 0

playChannel(current)

}

if(e.key==="ArrowDown" || e.key==="ArrowLeft"){

current--

if(current < 0) current = channels.length-1

playChannel(current)

}

})

/* canal inicial */

playChannel(0)

</script>

</body>
</html>
